<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Churn Predictor</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { display: block; width: 300px; margin: 10px auto; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .result-box { margin-top: 20px; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Customer Churn Predictor</h1>
        <form action="/predict" method="post">
            <input type="number" name="tenure" placeholder="Tenure (Months)" required>
            <input type="number" step="0.01" name="monthly" placeholder="Monthly Charges ($)" required>
            <button type="submit">Predict Risk</button>
        </form>

        {% if output %}
        <div class="result-box">
            <h2 style="color: blue;">Result: {{ output }}</h2>
            <p>Risk Probability: {{ prob }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
